<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050507" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LOOP" />
  <meta name="description" content="LOOP convierte vídeos cortos en microaprendizaje educativo." />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icons/icon-192.svg" />
  <title>LOOP · Microaprendizaje</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main id="app" class="app-shell"></main>

  <dialog id="comment-dialog" class="comment-dialog">
    <form method="dialog">
      <div class="dialog-header">
        <div>
          <p class="mini-label">Feedback cualitativo</p>
          <h2>Comentario sobre el vídeo</h2>
        </div>
        <button class="icon-btn" value="cancel" aria-label="Cerrar">×</button>
      </div>
      <p id="comment-video-title" class="dialog-video-title"></p>
      <textarea id="comment-input" rows="5" placeholder="Ej.: buen vídeo, pero demasiado básico; necesito más ejemplos prácticos..."></textarea>
      <menu class="dialog-actions">
        <button class="secondary-cta" value="cancel">Cancelar</button>
        <button class="main-cta" id="save-comment-btn" value="default">Guardar</button>
      </menu>
    </form>
  </dialog>

  <script src="./src/data.js"></script>
  <script src="./src/app.js"></script>
</body>
</html>
